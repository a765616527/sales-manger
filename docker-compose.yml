name: sales-manger

x-deploy:
  app_image: &app_image "sales-manger:latest"
  app_port_binding: &app_port_binding "3000:3000"
  admin_init_username: &admin_init_username "admin"
  admin_init_password: &admin_init_password "admin123456"
  session_secret: &session_secret "change-this-session-secret"
  mysql_root_password: &mysql_root_password "change-this-root-password"
  mysql_database: &mysql_database "sales_manager"
  mysql_user: &mysql_user "sales_user"
  mysql_password: &mysql_password "change-this-mysql-password"
  mysql_data_path: &mysql_data_path "./sales-manger-deploy"

services:
  app:
    image: *app_image
    container_name: sales-manger-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - *app_port_binding
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: *mysql_database
      DB_USER: *mysql_user
      DB_PASSWORD: *mysql_password
      SESSION_SECRET: *session_secret
      ADMIN_INIT_USERNAME: *admin_init_username
      ADMIN_INIT_PASSWORD: *admin_init_password
    labels:
      - com.centurylinklabs.watchtower.enable=true

  mysql:
    image: mysql:8.4
    container_name: sales-manger-mysql
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=false
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: *mysql_root_password
      MYSQL_DATABASE: *mysql_database
      MYSQL_USER: *mysql_user
      MYSQL_PASSWORD: *mysql_password
    volumes:
      - "./sales-manger-deploy:/var/lib/mysql"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: sales-manger-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "60"
